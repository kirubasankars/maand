global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["$AGENT_IP:9090"]
    basic_auth:
      username: admin
      password: admin
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      insecure_skip_verify: false

  - job_name: "node_exporter"
    static_configs:
      - targets: [ $$NODE_EXPORTER_TARGETS ]

  - job_name: "cadvisor_exporter"
    static_configs:
      - targets: [ $$CADVISOR_EXPORTER_TARGETS ]

  - job_name: "opensearch_exporter"
    static_configs:
      - targets: [ $$OPENSEARCH_EXPORTER_TARGETS ]
